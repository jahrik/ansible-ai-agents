---
# Which agents and tooling to install (each key maps to tasks/install/<key>.yml)
ai_agents_install:
  agy: true
  claude_code: true
  aider: false
  codex: false
  cursor: false
  cli_tools: true
  repo_sync: true

# Where standalone binaries land (no root needed; works on immutable rootfs)
ai_agents_bin_dir: "{{ ansible_facts['env']['HOME'] }}/.local/bin"

# Standard CLI toolchain, installed as pinned static release binaries into
# ai_agents_bin_dir (x86_64 Linux). archive: raw = the asset IS the binary;
# tar/zip = extract and copy `src` out of it. Bump versions here.
ai_agents_cli_tools:
  - name: rg
    version: "15.1.0"
    archive: tar
    url: "https://github.com/BurntSushi/ripgrep/releases/download/15.1.0/ripgrep-15.1.0-x86_64-unknown-linux-musl.tar.gz"
    src: "ripgrep-15.1.0-x86_64-unknown-linux-musl/rg"
  - name: fd
    version: "10.4.2"
    archive: tar
    url: "https://github.com/sharkdp/fd/releases/download/v10.4.2/fd-v10.4.2-x86_64-unknown-linux-musl.tar.gz"
    src: "fd-v10.4.2-x86_64-unknown-linux-musl/fd"
  - name: jq
    version: "1.8.2"
    archive: raw
    url: "https://github.com/jqlang/jq/releases/download/jq-1.8.2/jq-linux-amd64"
  - name: yq
    version: "4.53.3"
    archive: raw
    url: "https://github.com/mikefarah/yq/releases/download/v4.53.3/yq_linux_amd64"
  - name: bat
    version: "0.26.1"
    archive: tar
    url: "https://github.com/sharkdp/bat/releases/download/v0.26.1/bat-v0.26.1-x86_64-unknown-linux-musl.tar.gz"
    src: "bat-v0.26.1-x86_64-unknown-linux-musl/bat"
  - name: delta
    version: "0.19.2"
    archive: tar
    url: "https://github.com/dandavison/delta/releases/download/0.19.2/delta-0.19.2-x86_64-unknown-linux-musl.tar.gz"
    src: "delta-0.19.2-x86_64-unknown-linux-musl/delta"
  - name: ast-grep
    version: "0.44.0"
    archive: zip
    url: "https://github.com/ast-grep/ast-grep/releases/download/0.44.0/app-x86_64-unknown-linux-gnu.zip"
    src: "ast-grep"
  - name: xsv
    version: "0.13.0"
    archive: tar
    url: "https://github.com/BurntSushi/xsv/releases/download/0.13.0/xsv-0.13.0-x86_64-unknown-linux-musl.tar.gz"
    src: "xsv"
  - name: htmlq
    version: "0.4.0"
    archive: tar
    url: "https://github.com/mgdm/htmlq/releases/download/v0.4.0/htmlq-x86_64-linux.tar.gz"
    src: "htmlq"
  - name: gron
    version: "0.7.1"
    archive: tar
    url: "https://github.com/tomnomnom/gron/releases/download/v0.7.1/gron-linux-amd64-0.7.1.tgz"
    src: "gron"
  - name: jc
    version: "1.25.7"
    archive: tar
    url: "https://github.com/kellyjonbrazil/jc/releases/download/v1.25.7/jc-1.25.7-linux-x86_64.tar.gz"
    src: "jc"
  - name: sd
    version: "1.1.0"
    archive: tar
    url: "https://github.com/chmln/sd/releases/download/v1.1.0/sd-v1.1.0-x86_64-unknown-linux-musl.tar.gz"
    src: "sd-v1.1.0-x86_64-unknown-linux-musl/sd"
  - name: tokei
    version: "12.1.2"
    archive: tar
    url: "https://github.com/XAMPPRocky/tokei/releases/download/v12.1.2/tokei-x86_64-unknown-linux-musl.tar.gz"
    src: "tokei"
  - name: duckdb
    version: "1.5.4"
    archive: zip
    url: "https://github.com/duckdb/duckdb/releases/download/v1.5.4/duckdb_cli-linux-amd64.zip"
    src: "duckdb"
  - name: shellcheck
    version: "0.11.0"
    archive: tar
    url: "https://github.com/koalaman/shellcheck/releases/download/v0.11.0/shellcheck-v0.11.0.linux.x86_64.tar.gz"
    src: "shellcheck-v0.11.0/shellcheck"
  - name: shfmt
    version: "3.13.1"
    archive: raw
    url: "https://github.com/mvdan/sh/releases/download/v3.13.1/shfmt_v3.13.1_linux_amd64"
  - name: hadolint
    version: "2.14.0"
    archive: raw
    url: "https://github.com/hadolint/hadolint/releases/download/v2.14.0/hadolint-linux-x86_64"
  - name: actionlint
    version: "1.7.12"
    archive: tar
    url: "https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz"
    src: "actionlint"

# repo-sync (Go CLI: sync/clean/report across GitHub repos) — release binary
ai_agents_repo_sync_version: "0.2.2"
ai_agents_repo_sync_url: "https://github.com/jahrik/repo-sync/releases/download/v0.2.2/repo-sync_0.2.2_linux_amd64.tar.gz"

# Claude Code CLI path (installed by tasks/install/claude_code.yml) — used to
# register MCP servers via `claude mcp add-json`.
ai_agents_claude_bin: "{{ ansible_facts['env']['HOME'] }}/.local/bin/claude"

# The mcp-servers package (https://github.com/jahrik/mcp-servers) provides the
# default `github` server. Installed with `uv tool install`; uv is bootstrapped
# into ~/.local/bin if missing. Set false to install the package yourself.
ai_agents_mcp_servers_install: true
ai_agents_mcp_servers_source: "git+https://github.com/jahrik/mcp-servers@v0.3.0"
# Install is once-only; set true to force a reinstall and pull the latest commit.
ai_agents_mcp_servers_upgrade: false
ai_agents_uv_bin: "{{ ansible_facts['env']['HOME'] }}/.local/bin/uv"
ai_agents_mcp_github_bin: "{{ ansible_facts['env']['HOME'] }}/.local/bin/mcp-github"
ai_agents_mcp_workspace_bin: "{{ ansible_facts['env']['HOME'] }}/.local/bin/mcp-workspace"
ai_agents_mcp_data_bin: "{{ ansible_facts['env']['HOME'] }}/.local/bin/mcp-data"
ai_agents_mcp_dispatcher_bin: "{{ ansible_facts['env']['HOME'] }}/.local/bin/mcp-dispatcher"
ai_agents_mcp_dispatcher_db_path: "{{ ansible_facts['env']['HOME'] }}/.config/agents/dispatcher.db"

# MCP servers to register with the enabled agents (Claude Code + AGY). Entries
# are 'stdio' (command/args/env) or 'http' (url/headers). Never put a secret
# here — neither Claude Code's user scope nor AGY's mcp_config.json should
# ever hold one.
#
# The default `github` server authenticates as a GitHub App (writes land as
# "<app>[bot]"). With the three ai_agents_mcp_github_app_* vars set, it is
# registered through a wrapper that loads the App identity from an env file
# and reads the private key from its PEM path at launch — the key content is
# never written into any config file. Left unset, the bare server is
# registered and won't authenticate until GITHUB_APP_ID /
# GITHUB_APP_INSTALLATION_ID / GITHUB_APP_PRIVATE_KEY reach its environment
# some other way. See the README "MCP Servers" section.
#
# The `ws` server (mcp-workspace, same package) is read-only local git
# surveying — no credentials, no writes. It scans ai_agents_mcp_workspace_root.
# Registered as `ws` because Claude Code reserves the name "workspace".
#
# The `data` server (mcp-data, same package) runs SQL over large local files
# and keeps scratch tables across tool calls (DuckDB engine, duckdb_* tools).
# Local-only, no credentials. Limits are tunable via MCP_DATA_MAX_CHARS /
# MCP_DATA_QUERY_TIMEOUT / MCP_DUCKDB_MEMORY_LIMIT (defaults are sensible).
#
# The `dispatcher` server (mcp-dispatcher, same package) manages job state
# in an SQLite database and asynchronously spawns subagents to handle them.
# The server can spawn subprocesses when MCP_DISPATCHER_ALLOW_SPAWN is set to 1.
ai_agents_mcp_servers:
  - name: github
    type: stdio
    command: "{{ ai_agents_mcp_github_command }}"
    args: []
    env:
      MCP_GITHUB_ALLOW_WRITE: "{{ '1' if ai_agents_mcp_github_allow_write else '0' }}"
  - name: ws
    type: stdio
    command: "{{ ai_agents_mcp_workspace_bin }}"
    args: []
    env:
      MCP_WORKSPACE_ROOT: "{{ ai_agents_mcp_workspace_root }}"
  - name: data
    type: stdio
    command: "{{ ai_agents_mcp_data_bin }}"
    args: []
    env: {}
  - name: dispatcher
    type: stdio
    command: "{{ ai_agents_mcp_dispatcher_bin }}"
    args: []
    env:
      MCP_DISPATCHER_ALLOW_SPAWN: "1"
      MCP_DISPATCHER_DB_PATH: "{{ ai_agents_mcp_dispatcher_db_path }}"

# Root directory the workspace server surveys for git repos.
ai_agents_mcp_workspace_root: "{{ ansible_facts['env']['HOME'] }}/github"

# Permission deny rules merged into ~/.claude/settings.json (other settings
# keys are preserved). The gh entries enforce identity separation: agents do
# GitHub work as the App through mcp-github (Hard Rule 7); the gh CLI remains
# the human's own authenticated session. Note: a prefix deny cannot catch gh
# nested inside compound commands — the guard-bash hook below covers that layer.
ai_agents_claude_permission_deny:
  - "Bash(gh)"
  - "Bash(gh:*)"

# Lifecycle hooks. guard-bash ships with the agent config repo and speaks both
# hook contracts: it blocks gh anywhere in a shell command (compound commands
# included) and pushes to main/master.
ai_agents_hook_guard_bash: "{{ ai_agents_config_dest }}/hooks/guard-bash.sh"

# Merged into ~/.claude/settings.json alongside the deny rules; pre-existing
# hook entries are preserved.
ai_agents_claude_hooks:
  PreToolUse:
    - matcher: "Bash"
      hooks:
        - type: "command"
          command: "{{ ai_agents_hook_guard_bash }}"

# Written to AGY's Global Customizations Root as named hook groups
# (~/.gemini/config/hooks.json); groups with other names are preserved.
ai_agents_agy_hooks:
  guard-bash:
    PreToolUse:
      - matcher: "run_command"
        hooks:
          - type: "command"
            command: "{{ ai_agents_hook_guard_bash }}"

# Enable write operations for the mcp-github server (merging PRs, creating issues, etc.)
ai_agents_mcp_github_allow_write: true

# GitHub App identity for the github server. The App ID and installation ID
# are not secrets; the private key stays wherever its PEM already lives — the
# role records only the *path*. Set all three (host_vars / play vars) to
# enable the wrapper.
ai_agents_mcp_github_app_id: ""
ai_agents_mcp_github_app_installation_id: ""
ai_agents_mcp_github_app_private_key_file: ""

# Where the App identity lands when the vars above are set.
ai_agents_mcp_github_env_file: "{{ ansible_facts['env']['HOME'] }}/.config/ai-agents/github-app.env"
ai_agents_mcp_github_wrapper: "{{ ansible_facts['env']['HOME'] }}/.local/bin/mcp-github-app"

# True once the App identity is fully configured (all three vars set) — the
# single gate for the wrapper deploy, the registered command, and the warning.
ai_agents_mcp_github_app_configured: >-
  {{ ai_agents_mcp_github_app_id | length > 0
     and ai_agents_mcp_github_app_installation_id | length > 0
     and ai_agents_mcp_github_app_private_key_file | length > 0 }}

# Register the wrapper when the App identity is configured, the bare server
# binary otherwise.
ai_agents_mcp_github_command: >-
  {{ ai_agents_mcp_github_wrapper
     if ai_agents_mcp_github_app_configured | bool
     else ai_agents_mcp_github_bin }}

# Git identity for the workspace, so local commits match the agent's GitHub
# App bot identity (e.g. "myapp[bot]" /
# "<bot-user-id>+myapp[bot]@users.noreply.github.com") and complete the audit
# trail alongside Co-Authored-By trailers. Applied globally for the target
# user; left empty, git config is untouched.
ai_agents_git_user_name: ""
ai_agents_git_user_email: ""

# Config repo — override this with your own fork
ai_agents_config_repo: "https://github.com/jahrik/agent-config"
ai_agents_config_ref: "main"
ai_agents_config_dest: "{{ ansible_facts['env']['HOME'] }}/.config/agents"

# When a symlink target already exists as a real file or directory, move it aside
# to "<dest>.backup-<timestamp>" before linking, instead of failing or destroying
# it. Set false only if you are certain no conflicting files exist.
ai_agents_backup_existing: true

# Symlink targets (tool reads from here → points to config repo)
ai_agents_symlinks:
  - src: "{{ ai_agents_config_dest }}/skills"
    dest: "{{ ansible_facts['env']['HOME'] }}/.claude/skills"
  - src: "{{ ai_agents_config_dest }}/agents"
    dest: "{{ ansible_facts['env']['HOME'] }}/.claude/agents"
  # Claude Code reads ~/.claude/CLAUDE.md as its global config — point it at the
  # config repo's AGENTS.md so there is one source of truth.
  - src: "{{ ai_agents_config_dest }}/AGENTS.md"
    dest: "{{ ansible_facts['env']['HOME'] }}/.claude/CLAUDE.md"
  # AGY/Antigravity reads its Global Customizations Root at ~/.gemini/config/
  # (AGENTS.md + skills/ + agents/). Link into that dir — do not replace it; AGY
  # keeps its own mcp_config.json and projects/ there.
  - src: "{{ ai_agents_config_dest }}/AGENTS.md"
    dest: "{{ ansible_facts['env']['HOME'] }}/.gemini/config/AGENTS.md"
  - src: "{{ ai_agents_config_dest }}/skills"
    dest: "{{ ansible_facts['env']['HOME'] }}/.gemini/config/skills"
  # Antigravity registers subagents from an agents/ directory, but does not
  # auto-discover ~/.claude/agents/. Expose the same personas under its config
  # root so the load-sdlc-agents skill has a stable path to read them — mirroring
  # how skills/ is exposed to both tools.
  - src: "{{ ai_agents_config_dest }}/agents"
    dest: "{{ ansible_facts['env']['HOME'] }}/.gemini/config/agents"
