---
# Which agents to install
ai_agents_install:
  agy: true
  claude_code: true
  aider: false
  codex: false
  cursor: false

# Claude Code CLI path (installed by tasks/install/claude_code.yml) — used to
# register MCP servers via `claude mcp add-json`.
ai_agents_claude_bin: "{{ ansible_facts['env']['HOME'] }}/.local/bin/claude"

# MCP (Model Context Protocol) servers to wire into the installed agents.
# Registered with Claude Code (user scope, in ~/.claude.json) and written into
# AGY/Antigravity's ~/.gemini/config/mcp_config.json — only for whichever of
# those agents is enabled in ai_agents_install above.
#
# Each entry:
#   name     server name (required)
#   type     'http' for a remote server, 'stdio' for a local command (default 'stdio')
#   url      remote server URL          (type: http)
#   headers  optional dict of request headers (type: http)
#   command  executable to run          (type: stdio)
#   args     list of arguments          (type: stdio)
#   env      dict of environment variables (type: stdio)
#
# Secrets policy: never put a token in this file. The GitHub server below
# authenticates with a Personal Access Token taken from the
# GITHUB_PERSONAL_ACCESS_TOKEN environment variable — Claude Code expands ${VAR}
# in headers at runtime, so only the placeholder (never the token) is written to
# ~/.claude.json. Export the token before launching Claude Code, e.g. from your
# shell profile or a secrets manager:
#   export GITHUB_PERSONAL_ACCESS_TOKEN=ghp_xxx
#
# OAuth is intentionally NOT used here: GitHub's MCP auth server does not support
# OAuth Dynamic Client Registration, which Claude Code requires, so the OAuth
# flow fails with "Incompatible auth server: does not support dynamic client
# registration". The PAT header is the working remote path.
#
# AGY/Antigravity does not expand env vars, so the placeholder will not resolve
# there — configure GitHub auth in AGY by hand if you need it (never commit a
# token).
ai_agents_mcp_servers:
  - name: github
    type: http
    url: "https://api.githubcopilot.com/mcp/"
    headers:
      Authorization: "Bearer ${GITHUB_PERSONAL_ACCESS_TOKEN}"

# Config repo — override this with your own fork
ai_agents_config_repo: "https://github.com/jahrik/agent-config"
ai_agents_config_ref: "main"
ai_agents_config_dest: "{{ ansible_facts['env']['HOME'] }}/.config/agents"

# When a symlink target already exists as a real file or directory, move it aside
# to "<dest>.backup-<timestamp>" before linking, instead of failing or destroying
# it. Set false only if you are certain no conflicting files exist.
ai_agents_backup_existing: true

# Symlink targets (tool reads from here → points to config repo)
ai_agents_symlinks:
  - src: "{{ ai_agents_config_dest }}/skills"
    dest: "{{ ansible_facts['env']['HOME'] }}/.claude/skills"
  - src: "{{ ai_agents_config_dest }}/agents"
    dest: "{{ ansible_facts['env']['HOME'] }}/.claude/agents"
  # Claude Code reads ~/.claude/CLAUDE.md as its global config — point it at the
  # config repo's AGENTS.md so there is one source of truth.
  - src: "{{ ai_agents_config_dest }}/AGENTS.md"
    dest: "{{ ansible_facts['env']['HOME'] }}/.claude/CLAUDE.md"
  # AGY/Antigravity reads its Global Customizations Root at ~/.gemini/config/
  # (AGENTS.md + skills/ + agents/). Link into that dir — do not replace it; AGY
  # keeps its own mcp_config.json and projects/ there.
  - src: "{{ ai_agents_config_dest }}/AGENTS.md"
    dest: "{{ ansible_facts['env']['HOME'] }}/.gemini/config/AGENTS.md"
  - src: "{{ ai_agents_config_dest }}/skills"
    dest: "{{ ansible_facts['env']['HOME'] }}/.gemini/config/skills"
  # Antigravity registers subagents from an agents/ directory, but does not
  # auto-discover ~/.claude/agents/. Expose the same personas under its config
  # root so the load-sdlc-agents skill has a stable path to read them — mirroring
  # how skills/ is exposed to both tools.
  - src: "{{ ai_agents_config_dest }}/agents"
    dest: "{{ ansible_facts['env']['HOME'] }}/.gemini/config/agents"
