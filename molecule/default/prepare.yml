---
- name: Prepare
  hosts: all
  tasks:
    - name: Upgrade all packages to current (Arch)
      become: true
      community.general.pacman:
        upgrade: true
        update_cache: true
      changed_when: false
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Update apt cache (Debian)
      become: true
      ansible.builtin.apt:
        update_cache: true
      changed_when: false
      when: ansible_facts['os_family'] == 'Debian'

    - name: Install curl and unzip (unzip extracts the ast-grep zip asset)
      become: true
      ansible.builtin.package:
        name:
          - curl
          - unzip
        state: present

    # Simulate a machine that already has real Claude config, so the role's
    # backup-then-link path is exercised (a real directory and a real file).
    - name: Pre-seed a real ~/.claude/skills directory
      ansible.builtin.file:
        path: "{{ ansible_facts['env']['HOME'] }}/.claude/skills"
        state: directory
        mode: "0755"

    - name: Put a file inside the pre-existing skills directory
      ansible.builtin.copy:
        dest: "{{ ansible_facts['env']['HOME'] }}/.claude/skills/old-skill.md"
        content: "pre-existing skill\n"
        mode: "0644"

    - name: Pre-seed a real ~/.claude/CLAUDE.md file
      ansible.builtin.copy:
        dest: "{{ ansible_facts['env']['HOME'] }}/.claude/CLAUDE.md"
        content: "pre-existing global config\n"
        mode: "0644"
