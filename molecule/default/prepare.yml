---
- name: Prepare
  hosts: all
  tasks:
    - name: Upgrade all packages to current (Arch)
      become: true
      community.general.pacman:
        upgrade: true
        update_cache: true
      changed_when: false
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Update apt cache (Debian)
      become: true
      ansible.builtin.apt:
        update_cache: true
      changed_when: false
      when: ansible_facts['os_family'] == 'Debian'

    - name: Install curl and unzip (unzip extracts the ast-grep zip asset)
      become: true
      ansible.builtin.package:
        name:
          - curl
          - unzip
        state: present

    # Stand-in for the GitHub App PEM — the role only records its path and the
    # wrapper reads it at launch, so placeholder content is enough.
    - name: Create ~/.ssh for the dummy GitHub App key
      ansible.builtin.file:
        path: "{{ ansible_facts['env']['HOME'] }}/.ssh"
        state: directory
        mode: "0700"

    - name: Create a dummy GitHub App private key
      ansible.builtin.copy:
        dest: "{{ ansible_facts['env']['HOME'] }}/.ssh/molecule-dummy-app.pem"
        content: "molecule dummy key — not a real credential\n"
        mode: "0600"

    # Simulate a machine that already has real Claude config, so the role's
    # backup-then-link path is exercised (a real directory and a real file).
    - name: Pre-seed a real ~/.claude/skills directory
      ansible.builtin.file:
        path: "{{ ansible_facts['env']['HOME'] }}/.claude/skills"
        state: directory
        mode: "0755"

    - name: Put a file inside the pre-existing skills directory
      ansible.builtin.copy:
        dest: "{{ ansible_facts['env']['HOME'] }}/.claude/skills/old-skill.md"
        content: "pre-existing skill\n"
        mode: "0644"

    - name: Pre-seed a real ~/.claude/CLAUDE.md file
      ansible.builtin.copy:
        dest: "{{ ansible_facts['env']['HOME'] }}/.claude/CLAUDE.md"
        content: "pre-existing global config\n"
        mode: "0644"

    # Pre-existing user settings must survive the deny-rule merge untouched.
    - name: Pre-seed a real ~/.claude/settings.json
      ansible.builtin.copy:
        dest: "{{ ansible_facts['env']['HOME'] }}/.claude/settings.json"
        content: "{{ {'theme': 'dark', 'permissions': {'allow': ['WebSearch']}} | to_nice_json }}\n"
        mode: "0644"
