---
- name: Verify
  hosts: all
  gather_facts: true
  tasks:

    - name: Check that git is installed
      ansible.builtin.package_facts:
        manager: auto

    - name: Assert git is installed
      ansible.builtin.assert:
        that: "'git' in ansible_facts.packages"
        fail_msg: "git package was not installed"

    - name: Stat agent config destination
      ansible.builtin.stat:
        path: "{{ ansible_facts['env']['HOME'] }}/.config/agents"
      register: config_dest

    - name: Assert agent config repo was cloned
      ansible.builtin.assert:
        that: config_dest.stat.exists
        fail_msg: "Agent config repo was not cloned to ~/.config/agents"

    - name: Stat ~/.claude/skills symlink
      ansible.builtin.stat:
        path: "{{ ansible_facts['env']['HOME'] }}/.claude/skills"
        follow: false
      register: claude_skills

    - name: Assert ~/.claude/skills is a symlink (pre-existing dir was replaced)
      ansible.builtin.assert:
        that: claude_skills.stat.islnk
        fail_msg: "~/.claude/skills is not a symlink — a pre-existing real dir was not handled"

    - name: Stat ~/.claude/agents symlink
      ansible.builtin.stat:
        path: "{{ ansible_facts['env']['HOME'] }}/.claude/agents"
        follow: false
      register: claude_agents

    - name: Assert ~/.claude/agents is a symlink
      ansible.builtin.assert:
        that: claude_agents.stat.islnk
        fail_msg: "~/.claude/agents is not a symlink — a pre-existing real dir was not handled"

    - name: Stat ~/.gemini/config/AGENTS.md symlink
      ansible.builtin.stat:
        path: "{{ ansible_facts['env']['HOME'] }}/.gemini/config/AGENTS.md"
        follow: false
      register: gemini_agents

    - name: Assert ~/.gemini/config/AGENTS.md is a symlink
      ansible.builtin.assert:
        that: gemini_agents.stat.islnk
        fail_msg: "~/.gemini/config/AGENTS.md is not a symlink — a pre-existing real file was not handled"

    - name: Stat ~/.gemini/config/skills symlink
      ansible.builtin.stat:
        path: "{{ ansible_facts['env']['HOME'] }}/.gemini/config/skills"
        follow: false
      register: gemini_skills

    - name: Assert ~/.gemini/config/skills is a symlink
      ansible.builtin.assert:
        that: gemini_skills.stat.islnk
        fail_msg: "~/.gemini/config/skills is not a symlink — a pre-existing real dir was not handled"

    - name: Stat ~/.gemini/config/agents symlink
      ansible.builtin.stat:
        path: "{{ ansible_facts['env']['HOME'] }}/.gemini/config/agents"
        follow: false
      register: gemini_agents_dir

    - name: Assert ~/.gemini/config/agents is a symlink
      ansible.builtin.assert:
        that: gemini_agents_dir.stat.islnk
        fail_msg: "~/.gemini/config/agents is not a symlink — subagents are not exposed to AGY"

    - name: Stat ~/.claude/CLAUDE.md symlink
      ansible.builtin.stat:
        path: "{{ ansible_facts['env']['HOME'] }}/.claude/CLAUDE.md"
        follow: false
      register: claude_md

    - name: Assert ~/.claude/CLAUDE.md is a symlink (pre-existing file was replaced)
      ansible.builtin.assert:
        that: claude_md.stat.islnk
        fail_msg: "~/.claude/CLAUDE.md is not a symlink — a pre-existing real file was not handled"

    - name: Find backups of the pre-existing Claude config
      ansible.builtin.find:
        paths: "{{ ansible_facts['env']['HOME'] }}/.claude"
        patterns:
          - "CLAUDE.md.backup-*"
          - "skills.backup-*"
        file_type: any
        hidden: true
      register: ai_agents_backups

    - name: Assert the pre-existing file and directory were backed up, not destroyed
      ansible.builtin.assert:
        that: ai_agents_backups.matched >= 2
        fail_msg: "pre-existing CLAUDE.md / skills were not backed up before linking"

    - name: Stat each CLI tool binary
      ansible.builtin.stat:
        path: "{{ ansible_facts['env']['HOME'] }}/.local/bin/{{ item }}"
      loop:
        - rg
        - fd
        - jq
        - yq
        - bat
        - delta
        - ast-grep
        - xsv
        - htmlq
        - gron
        - jc
        - sd
        - tokei
        - duckdb
        - shellcheck
        - shfmt
        - hadolint
        - actionlint
        - repo-sync
      register: cli_tool_stats

    - name: Assert every CLI tool binary is installed and executable
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.executable
        fail_msg: "{{ item.item }} was not installed to ~/.local/bin"
      loop: "{{ cli_tool_stats.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Run rg and jq to prove the binaries execute
      ansible.builtin.command: "{{ ansible_facts['env']['HOME'] }}/.local/bin/{{ item }} --version"
      loop:
        - rg
        - jq
      changed_when: false

    - name: Stat the GitHub App env file
      ansible.builtin.stat:
        path: "{{ ansible_facts['env']['HOME'] }}/.config/ai-agents/github-app.env"
      register: github_app_env

    - name: Assert the env file exists with owner-only permissions
      ansible.builtin.assert:
        that:
          - github_app_env.stat.exists
          - github_app_env.stat.mode == '0600'
        fail_msg: "github-app.env missing or not mode 0600"

    - name: Read the GitHub App env file
      ansible.builtin.slurp:
        src: "{{ ansible_facts['env']['HOME'] }}/.config/ai-agents/github-app.env"
      register: github_app_env_content

    - name: Assert the env file records the identity but never key material
      vars:
        env_text: "{{ github_app_env_content.content | b64decode }}"
      ansible.builtin.assert:
        that:
          - "'GITHUB_APP_ID=\"12345\"' in env_text"
          - "'GITHUB_APP_INSTALLATION_ID=\"67890\"' in env_text"
          - "'molecule-dummy-app.pem' in env_text"
          - "'molecule dummy key' not in env_text"
        fail_msg: "github-app.env is missing the App identity or contains key content"

    - name: Stat the mcp-github wrapper
      ansible.builtin.stat:
        path: "{{ ansible_facts['env']['HOME'] }}/.local/bin/mcp-github-app"
      register: github_app_wrapper

    - name: Assert the wrapper is installed and executable
      ansible.builtin.assert:
        that:
          - github_app_wrapper.stat.exists
          - github_app_wrapper.stat.executable
        fail_msg: "mcp-github-app wrapper was not installed to ~/.local/bin"

    - name: Read the global git identity
      ansible.builtin.command: git config --global --get {{ item }}
      loop:
        - user.name
        - user.email
      register: git_identity
      changed_when: false

    - name: Assert the git identity matches the bot account
      ansible.builtin.assert:
        that:
          - git_identity.results[0].stdout == 'molecule-bot[bot]'
          - git_identity.results[1].stdout == '0+molecule-bot[bot]@users.noreply.github.com'
        fail_msg: "global git identity was not set to the bot account"

    - name: Verify installed agents and their config wiring
      ansible.builtin.include_tasks: tasks/verify_agents.yml
