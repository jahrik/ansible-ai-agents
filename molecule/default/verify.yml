---
- name: Verify
  hosts: all
  gather_facts: true
  tasks:

    - name: Check that git is installed
      ansible.builtin.package_facts:
        manager: auto

    - name: Assert git is installed
      ansible.builtin.assert:
        that: "'git' in ansible_facts.packages"
        fail_msg: "git package was not installed"

    - name: Stat agent config destination
      ansible.builtin.stat:
        path: "{{ ansible_env.HOME }}/.config/agents"
      register: config_dest

    - name: Assert agent config repo was cloned
      ansible.builtin.assert:
        that: config_dest.stat.exists
        fail_msg: "Agent config repo was not cloned to ~/.config/agents"

    - name: Stat ~/.claude/skills symlink
      ansible.builtin.stat:
        path: "{{ ansible_env.HOME }}/.claude/skills"
        follow: false
      register: claude_skills

    - name: Assert ~/.claude/skills is a symlink (pre-existing dir was replaced)
      ansible.builtin.assert:
        that: claude_skills.stat.islnk
        fail_msg: "~/.claude/skills is not a symlink — a pre-existing real dir was not handled"

    - name: Stat ~/.claude/agents symlink
      ansible.builtin.stat:
        path: "{{ ansible_env.HOME }}/.claude/agents"
        follow: false
      register: claude_agents

    - name: Assert ~/.claude/agents is a symlink
      ansible.builtin.assert:
        that: claude_agents.stat.islnk
        fail_msg: "~/.claude/agents is not a symlink — a pre-existing real dir was not handled"

    - name: Stat ~/.gemini/config/AGENTS.md symlink
      ansible.builtin.stat:
        path: "{{ ansible_env.HOME }}/.gemini/config/AGENTS.md"
        follow: false
      register: gemini_agents

    - name: Assert ~/.gemini/config/AGENTS.md is a symlink
      ansible.builtin.assert:
        that: gemini_agents.stat.islnk
        fail_msg: "~/.gemini/config/AGENTS.md is not a symlink — a pre-existing real file was not handled"

    - name: Stat ~/.gemini/config/skills symlink
      ansible.builtin.stat:
        path: "{{ ansible_env.HOME }}/.gemini/config/skills"
        follow: false
      register: gemini_skills

    - name: Assert ~/.gemini/config/skills is a symlink
      ansible.builtin.assert:
        that: gemini_skills.stat.islnk
        fail_msg: "~/.gemini/config/skills is not a symlink — a pre-existing real dir was not handled"

    - name: Stat ~/.claude/CLAUDE.md symlink
      ansible.builtin.stat:
        path: "{{ ansible_env.HOME }}/.claude/CLAUDE.md"
        follow: false
      register: claude_md

    - name: Assert ~/.claude/CLAUDE.md is a symlink (pre-existing file was replaced)
      ansible.builtin.assert:
        that: claude_md.stat.islnk
        fail_msg: "~/.claude/CLAUDE.md is not a symlink — a pre-existing real file was not handled"

    - name: Find backups of the pre-existing Claude config
      ansible.builtin.find:
        paths: "{{ ansible_env.HOME }}/.claude"
        patterns:
          - "CLAUDE.md.backup-*"
          - "skills.backup-*"
        file_type: any
        hidden: true
      register: ai_agents_backups

    - name: Assert the pre-existing file and directory were backed up, not destroyed
      ansible.builtin.assert:
        that: ai_agents_backups.matched >= 2
        fail_msg: "pre-existing CLAUDE.md / skills were not backed up before linking"

    - name: Verify installed agents and their config wiring
      ansible.builtin.include_tasks: tasks/verify_agents.yml
