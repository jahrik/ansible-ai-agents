---
# Verify each agent's binary is installed and its config is wired up.
- name: Stat agy binary
  ansible.builtin.stat:
    path: "{{ ansible_facts['env']['HOME'] }}/.local/bin/agy"
  register: agy_bin
- name: Assert agy is installed
  ansible.builtin.assert:
    that: agy_bin.stat.exists

- name: Run agy --version
  ansible.builtin.command: "{{ ansible_facts['env']['HOME'] }}/.local/bin/agy --version"
  register: agy_version
  changed_when: false
- name: Assert agy version output
  ansible.builtin.assert:
    that: "agy_version.rc == 0"

- name: Stat claude binary
  ansible.builtin.stat:
    path: "{{ ansible_facts['env']['HOME'] }}/.local/bin/claude"
  register: claude_bin
- name: Assert claude is installed
  ansible.builtin.assert:
    that: claude_bin.stat.exists

- name: Run claude --version
  ansible.builtin.command: "{{ ansible_facts['env']['HOME'] }}/.local/bin/claude --version"
  register: claude_version
  changed_when: false
- name: Assert claude version output
  ansible.builtin.assert:
    that: "'claude' in claude_version.stdout | lower"

- name: Stat aider binary
  ansible.builtin.stat:
    path: "{{ ansible_facts['env']['HOME'] }}/.local/bin/aider"
  register: aider_bin
- name: Assert aider is installed
  ansible.builtin.assert:
    that: aider_bin.stat.exists

- name: Run aider --version
  ansible.builtin.command: "{{ ansible_facts['env']['HOME'] }}/.local/bin/aider --version"
  register: aider_version
  changed_when: false
- name: Assert aider version output
  ansible.builtin.assert:
    that: "'aider' in aider_version.stdout | lower"

- name: Stat codex binary
  ansible.builtin.stat:
    path: "{{ ansible_facts['env']['HOME'] }}/.local/bin/codex"
  register: codex_bin
- name: Assert codex is installed
  ansible.builtin.assert:
    that: codex_bin.stat.exists

- name: Run codex --version
  ansible.builtin.command: "{{ ansible_facts['env']['HOME'] }}/.local/bin/codex --version"
  register: codex_version
  changed_when: false
- name: Assert codex version output
  ansible.builtin.assert:
    that: "'codex' in codex_version.stdout | lower"

- name: Stat aider config file
  ansible.builtin.stat:
    path: "{{ ansible_facts['env']['HOME'] }}/.aider.conf.yml"
  register: aider_conf
- name: Assert aider config file exists
  ansible.builtin.assert:
    that: aider_conf.stat.exists

# Permission settings
- name: Read Claude Code settings
  ansible.builtin.slurp:
    src: "{{ ansible_facts['env']['HOME'] }}/.claude/settings.json"
  register: claude_settings
- name: Assert the gh deny rules were merged and existing settings survived
  vars:
    settings: "{{ claude_settings.content | b64decode | from_json }}"
  ansible.builtin.assert:
    that:
      - "'Bash(gh)' in settings.permissions.deny"
      - "'Bash(gh:*)' in settings.permissions.deny"
      - "'WebSearch' in settings.permissions.allow"
      - settings.theme == 'dark'
    fail_msg: "gh deny rules missing from settings.json, or the merge clobbered existing keys"

- name: Assert the guard-bash hook was registered and the user's hook survived
  vars:
    settings: "{{ claude_settings.content | b64decode | from_json }}"
    hook_commands: >-
      {{ settings.hooks.PreToolUse | map(attribute='hooks') | flatten
         | map(attribute='command') | list }}
  ansible.builtin.assert:
    that:
      - hook_commands | select('search', 'guard-bash.sh') | length > 0
      - "'/usr/local/bin/user-hook.sh' in hook_commands"
    fail_msg: "guard-bash hook missing from settings.json, or the merge dropped the user's hook"

- name: Read AGY hooks
  ansible.builtin.slurp:
    src: "{{ ansible_facts['env']['HOME'] }}/.gemini/config/hooks.json"
  register: agy_hooks
- name: Assert the AGY guard-bash hook group was merged and the user's group survived
  vars:
    hooks: "{{ agy_hooks.content | b64decode | from_json }}"
  ansible.builtin.assert:
    that:
      - "'guard-bash' in hooks"
      - hooks['guard-bash'].PreToolUse[0].hooks[0].command is search('guard-bash.sh')
      - "'user-hook' in hooks"
    fail_msg: "AGY hooks.json is missing the managed group or dropped the user's group"

# MCP servers
- name: Read Claude Code config
  ansible.builtin.slurp:
    src: "{{ ansible_facts['env']['HOME'] }}/.claude.json"
  register: claude_config
- name: Assert github, ws, and data MCP servers registered with Claude Code
  ansible.builtin.assert:
    that:
      - "'github' in (claude_config.content | b64decode | from_json).mcpServers"
      - "'ws' in (claude_config.content | b64decode | from_json).mcpServers"
      - "'data' in (claude_config.content | b64decode | from_json).mcpServers"
    fail_msg: "github/ws/data MCP servers were not registered with Claude Code"

- name: Read AGY MCP config
  ansible.builtin.slurp:
    src: "{{ ansible_facts['env']['HOME'] }}/.gemini/config/mcp_config.json"
  register: agy_mcp_config
- name: Assert github, ws, and data MCP servers configured for AGY with commands
  ansible.builtin.assert:
    that:
      - "'github' in (agy_mcp_config.content | b64decode | from_json).mcpServers"
      - "(agy_mcp_config.content | b64decode | from_json).mcpServers.github.command is defined"
      - "'ws' in (agy_mcp_config.content | b64decode | from_json).mcpServers"
      - "(agy_mcp_config.content | b64decode | from_json).mcpServers.ws.command is defined"
      - "'data' in (agy_mcp_config.content | b64decode | from_json).mcpServers"
      - "(agy_mcp_config.content | b64decode | from_json).mcpServers.data.command is defined"
    fail_msg: "github/ws/data MCP servers were not configured for AGY"

- name: Stat the mcp-servers binaries
  ansible.builtin.stat:
    path: "{{ ansible_facts['env']['HOME'] }}/.local/bin/{{ item }}"
  loop:
    - mcp-github
    - mcp-workspace
    - mcp-data
  register: mcp_server_bins
- name: Assert the mcp-servers binaries are installed
  ansible.builtin.assert:
    that: item.stat.exists
    fail_msg: "{{ item.item }} binary from the mcp-servers package was not installed"
  loop: "{{ mcp_server_bins.results }}"
  loop_control:
    label: "{{ item.item }}"
