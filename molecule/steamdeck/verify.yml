---
- name: Verify
  hosts: all
  gather_facts: true
  tasks:

    - name: Stat agent config destination
      ansible.builtin.stat:
        path: "{{ ansible_facts['env']['HOME'] }}/.config/agents"
      register: config_dest

    - name: Assert agent config repo was cloned
      ansible.builtin.assert:
        that: config_dest.stat.exists
        fail_msg: "Agent config repo was not cloned to ~/.config/agents"

    - name: Verify SteamOS environment detection (ID=steamos in /etc/os-release)
      ansible.builtin.command: grep -q 'ID=steamos' /etc/os-release
      register: steamos_check
      changed_when: false

    - name: Assert SteamOS environment is detected
      ansible.builtin.assert:
        that: steamos_check.rc == 0
        fail_msg: "SteamOS /etc/os-release was not faked correctly in prepare"

    - name: Stat ~/.claude/skills symlink
      ansible.builtin.stat:
        path: "{{ ansible_facts['env']['HOME'] }}/.claude/skills"
        follow: false
      register: claude_skills

    - name: Assert ~/.claude/skills is a symlink
      ansible.builtin.assert:
        that: claude_skills.stat.islnk
        fail_msg: "~/.claude/skills is not a symlink — a pre-existing real dir was not handled"

    - name: Stat ~/.claude/agents symlink
      ansible.builtin.stat:
        path: "{{ ansible_facts['env']['HOME'] }}/.claude/agents"
        follow: false
      register: claude_agents

    - name: Assert ~/.claude/agents is a symlink
      ansible.builtin.assert:
        that: claude_agents.stat.islnk
        fail_msg: "~/.claude/agents is not a symlink — a pre-existing real dir was not handled"

    - name: Stat ~/.gemini/config/AGENTS.md symlink
      ansible.builtin.stat:
        path: "{{ ansible_facts['env']['HOME'] }}/.gemini/config/AGENTS.md"
        follow: false
      register: gemini_agents

    - name: Assert ~/.gemini/config/AGENTS.md is a symlink
      ansible.builtin.assert:
        that: gemini_agents.stat.islnk
        fail_msg: "~/.gemini/config/AGENTS.md is not a symlink — a pre-existing real file was not handled"

    - name: Stat ~/.gemini/config/skills symlink
      ansible.builtin.stat:
        path: "{{ ansible_facts['env']['HOME'] }}/.gemini/config/skills"
        follow: false
      register: gemini_skills

    - name: Assert ~/.gemini/config/skills is a symlink
      ansible.builtin.assert:
        that: gemini_skills.stat.islnk
        fail_msg: "~/.gemini/config/skills is not a symlink — a pre-existing real dir was not handled"

    - name: Stat ~/.gemini/config/agents symlink
      ansible.builtin.stat:
        path: "{{ ansible_facts['env']['HOME'] }}/.gemini/config/agents"
        follow: false
      register: gemini_agents_dir

    - name: Assert ~/.gemini/config/agents is a symlink
      ansible.builtin.assert:
        that: gemini_agents_dir.stat.islnk
        fail_msg: "~/.gemini/config/agents is not a symlink — subagents are not exposed to AGY"
