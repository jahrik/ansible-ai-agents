---
- name: Include OS-specific variables
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_facts['distribution'] | lower }}.yml"
        - "{{ ansible_facts['os_family'] | lower }}.yml"
        - "default.yml"
      paths:
        - "vars"
      skip: true
  tags:
    - ai_agents
    - "ai_agents:vars"

- name: Install agents
  ansible.builtin.include_tasks:
    file: "install/{{ item.key }}.yml"
    apply:
      tags:
        - ai_agents
        - "ai_agents:install"
  loop: "{{ ai_agents_install | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when: item.value | bool
  tags:
    - ai_agents
    - "ai_agents:install"

- name: Clone agent config repo
  ansible.builtin.include_tasks:
    file: config/clone.yml
    apply:
      tags:
        - ai_agents
        - "ai_agents:clone"
  tags:
    - ai_agents
    - "ai_agents:clone"

- name: Create symlinks
  ansible.builtin.include_tasks:
    file: config/symlinks.yml
    apply:
      tags:
        - ai_agents
        - "ai_agents:symlinks"
  tags:
    - ai_agents
    - "ai_agents:symlinks"

- name: Install MCP servers package
  ansible.builtin.include_tasks:
    file: config/mcp_servers.yml
    apply:
      tags:
        - ai_agents
        - "ai_agents:mcp_servers"
  when: ai_agents_mcp_servers_install | bool
  tags:
    - ai_agents
    - "ai_agents:mcp_servers"

- name: Deploy the GitHub App identity for mcp-github
  ansible.builtin.include_tasks:
    file: config/github_app.yml
    apply:
      tags:
        - ai_agents
        - "ai_agents:github_app"
  when: ai_agents_mcp_github_app_configured | bool
  tags:
    - ai_agents
    - "ai_agents:github_app"

- name: Configure the git identity
  ansible.builtin.include_tasks:
    file: config/git_identity.yml
    apply:
      tags:
        - ai_agents
        - "ai_agents:git_identity"
  when:
    - ai_agents_git_user_name | length > 0
    - ai_agents_git_user_email | length > 0
  tags:
    - ai_agents
    - "ai_agents:git_identity"

- name: Configure MCP servers
  ansible.builtin.include_tasks:
    file: config/mcp.yml
    apply:
      tags:
        - ai_agents
        - "ai_agents:mcp"
  tags:
    - ai_agents
    - "ai_agents:mcp"
