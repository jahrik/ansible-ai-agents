---
- name: Ensure ~/.agents directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.agents"
    state: directory
    mode: "0755"

- name: Create symlinks from config repo to tool-expected locations
  ansible.builtin.file:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: true
  loop: "{{ ai_agents_symlinks }}"

- name: Symlink ~/.gemini/config → agent config (AGY/Antigravity)
  ansible.builtin.file:
    src: "{{ ai_agents_config_dest }}"
    dest: "{{ ansible_env.HOME }}/.gemini/config"
    state: link
    force: true

- name: Symlink CLAUDE.md for Claude Code compatibility
  ansible.builtin.file:
    src: "{{ ai_agents_config_dest }}/AGENTS.md"
    dest: "{{ ansible_env.HOME }}/.claude/AGENTS.md"
    state: link
    force: true
