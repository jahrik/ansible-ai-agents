---
- name: Ensure agent configuration directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ ansible_env.HOME }}/.gemini/config"
    - "{{ ansible_env.HOME }}/.claude"

- name: Resolve a single backup timestamp for this run
  ansible.builtin.set_fact:
    ai_agents_backup_stamp: "{{ lookup('pipe', 'date +%Y%m%d-%H%M%S') }}"
  when: ai_agents_backup_stamp is not defined

- name: Stat each symlink destination
  ansible.builtin.stat:
    path: "{{ item.dest }}"
    follow: false
  loop: "{{ ai_agents_symlinks }}"
  loop_control:
    label: "{{ item.dest }}"
  register: ai_agents_dest_stat

# A real file or directory at the destination would otherwise fail the link
# (directories) or be silently destroyed (files). Move it aside first. Existing
# symlinks are left for the link task below to replace (force), since they hold
# no data worth preserving.
- name: Back up pre-existing real files/directories at symlink targets
  ansible.builtin.command:
    cmd: "mv -- '{{ item.item.dest }}' '{{ item.item.dest }}.backup-{{ ai_agents_backup_stamp }}'"
    creates: "{{ item.item.dest }}.backup-{{ ai_agents_backup_stamp }}"
  loop: "{{ ai_agents_dest_stat.results }}"
  loop_control:
    label: "{{ item.item.dest }}"
  when:
    - ai_agents_backup_existing | bool
    - item.stat.exists
    - not item.stat.islnk

- name: Create symlinks from config repo to tool-expected locations
  ansible.builtin.file:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: true
    follow: false
  loop: "{{ ai_agents_symlinks }}"
  loop_control:
    label: "{{ item.dest }}"
