---
- name: Ensure agent configuration directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ ansible_env.HOME }}/.agents"
    - "{{ ansible_env.HOME }}/.gemini"
    - "{{ ansible_env.HOME }}/.claude"
    - "{{ ansible_env.HOME }}/.copilot"

- name: Create symlinks from config repo to tool-expected locations
  ansible.builtin.file:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: true
    follow: false
  loop: "{{ ai_agents_symlinks }}"

- name: Symlink ~/.gemini/config → agent config (AGY/Antigravity)
  ansible.builtin.file:
    src: "{{ ai_agents_config_dest }}"
    dest: "{{ ansible_env.HOME }}/.gemini/config"
    state: link
    force: true
    follow: false

# Claude Code reads ~/.claude/CLAUDE.md as its global config; point that at the
# config repo's AGENTS.md so there is one source of truth. Project-level files
# stay named AGENTS.md.
- name: Symlink config AGENTS.md to ~/.claude/CLAUDE.md (Claude Code global config)
  ansible.builtin.file:
    src: "{{ ai_agents_config_dest }}/AGENTS.md"
    dest: "{{ ansible_env.HOME }}/.claude/CLAUDE.md"
    state: link
    force: true
    follow: false
