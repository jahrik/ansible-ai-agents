---
# Merge managed permission deny rules and lifecycle hooks into
# ~/.claude/settings.json without touching the user's other settings
# (statusline, model, theme, …). The gh deny + guard-bash hook enforce
# identity separation: agents act as the GitHub App through mcp-github;
# the gh CLI stays the human's own session.

- name: Read existing Claude Code settings
  ansible.builtin.slurp:
    src: "{{ ansible_facts['env']['HOME'] }}/.claude/settings.json"
  register: ai_agents_claude_settings_raw
  failed_when: false

- name: Merge the managed deny rules and hooks into the settings
  block:
    - name: Write the merged settings
      vars:
        existing: >-
          {{ (ai_agents_claude_settings_raw.content | b64decode | from_json | default({}, true))
             if (ai_agents_claude_settings_raw.content is defined
                 and (ai_agents_claude_settings_raw.content | b64decode | trim) != '')
             else {} }}
        merged_deny: >-
          {{ (existing.permissions | default({}, true)).deny | default([], true)
             | union(ai_agents_claude_permission_deny) | sort }}
        merged_hooks: >-
          {{ existing.hooks | default({}, true)
             | combine(ai_agents_claude_hooks, list_merge='append_rp') }}
        merged: >-
          {{ existing
             | combine({'permissions': (existing.permissions | default({}, true))
                                       | combine({'deny': merged_deny})}
                       if (ai_agents_claude_permission_deny | length > 0) else {})
             | combine({'hooks': merged_hooks}
                       if (ai_agents_claude_hooks | length > 0) else {}) }}
      ansible.builtin.copy:
        dest: "{{ ansible_facts['env']['HOME'] }}/.claude/settings.json"
        content: "{{ merged | to_nice_json }}\n"
        mode: "0644"
  rescue:
    - name: Fail with a clear message if settings.json is invalid
      ansible.builtin.fail:
        msg: "Failed to merge managed rules into ~/.claude/settings.json. If the file was hand-edited, please ensure it contains valid JSON, or delete it to let Claude Code recreate it."
