---
# Install the mcp-servers package, which provides the default `github` MCP
# server (console script mcp-github) and any future servers. Installed with
# `uv tool install`; uv is bootstrapped into ~/.local/bin if it is missing.

- name: Check whether uv is installed
  ansible.builtin.stat:
    path: "{{ ai_agents_uv_bin }}"
  register: ai_agents_uv_binary

- name: Bootstrap uv
  when: not ai_agents_uv_binary.stat.exists
  block:
    - name: Create a private temp directory for the uv installer
      ansible.builtin.tempfile:
        state: directory
        suffix: uv-install
      register: ai_agents_uv_tmp

    - name: Download the uv installer script
      ansible.builtin.get_url:
        url: https://astral.sh/uv/install.sh
        dest: "{{ ai_agents_uv_tmp.path }}/install.sh"
        mode: "0700"

    - name: Run the uv installer script
      ansible.builtin.command:
        cmd: "{{ ai_agents_uv_tmp.path }}/install.sh"
      args:
        creates: "{{ ai_agents_uv_bin }}"

    - name: Remove the uv installer temp directory
      ansible.builtin.file:
        path: "{{ ai_agents_uv_tmp.path }}"
        state: absent

- name: Install the mcp-servers package
  ansible.builtin.command:
    cmd: "{{ ai_agents_uv_bin }} tool install --force {{ ai_agents_mcp_servers_source }}"
  args:
    creates: "{{ ai_agents_mcp_github_bin }}"

# Upgrade to the latest source ref (the install above is once-only, so it would
# otherwise freeze at whatever commit was current at first install). `uv tool
# upgrade` re-resolves the git ref and only reinstalls on a real change — it
# prints "Updated X -> Y" then, and "Nothing to upgrade" otherwise, so this is
# idempotent. On by default; set ai_agents_mcp_servers_upgrade=false to pin.
- name: Upgrade the mcp-servers package to the latest source ref
  ansible.builtin.command:
    cmd: "{{ ai_agents_uv_bin }} tool upgrade mcp-servers"
  register: ai_agents_mcp_upgrade
  changed_when: >-
    'Updated' in (ai_agents_mcp_upgrade.stdout | default(''))
    or 'Updated' in (ai_agents_mcp_upgrade.stderr | default(''))
  when: ai_agents_mcp_servers_upgrade | bool

# The github server authenticates as a GitHub App. Registration succeeds
# either way; without the full App identity it just can't connect.
- name: Warn if the GitHub App identity is not fully configured
  ansible.builtin.debug:
    msg: >-
      GitHub App identity incomplete (all three of ai_agents_mcp_github_app_id
      / _installation_id / _private_key_file must be set). The github MCP
      server is registered but won't authenticate until GITHUB_APP_ID,
      GITHUB_APP_INSTALLATION_ID and GITHUB_APP_PRIVATE_KEY reach its
      environment.
  when:
    - ai_agents_mcp_servers | selectattr('name', 'equalto', 'github') | list | length > 0
    - not ai_agents_mcp_github_app_configured | bool

# Always install the wrapper: it is the registered github command whether or
# not the App identity is configured. It sources the identity when the env file
# exists (written by github_app.yml) and execs the bare server otherwise, so the
# registered command never flips back to the unauthenticated binary between runs.
- name: Install the mcp-github wrapper
  ansible.builtin.template:
    src: mcp-github-app.sh.j2
    dest: "{{ ai_agents_mcp_github_wrapper }}"
    mode: "0755"

- name: Install the mcp-playwright wrapper
  ansible.builtin.template:
    src: mcp-playwright.sh.j2
    dest: "{{ ai_agents_mcp_playwright_wrapper }}"
    mode: "0755"
  when: ai_agents_mcp_servers | selectattr('name', 'equalto', 'playwright') | list | length > 0
