---
- name: Ensure git is installed
  ansible.builtin.package:
    name: git
    state: present
  become: true
  when: ansible_facts['distribution_release'] | default('') != 'holo'

- name: Ensure config destination directory exists
  ansible.builtin.file:
    path: "{{ ai_agents_config_dest | dirname }}"
    state: directory
    mode: "0755"

- name: Clone or update agent config repo
  ansible.builtin.git:
    repo: "{{ ai_agents_config_repo }}"
    dest: "{{ ai_agents_config_dest }}"
    version: "{{ ai_agents_config_ref }}"
    update: true
    force: false
