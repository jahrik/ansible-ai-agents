---
# Install repo-sync (Go CLI) from its GitHub release into ai_agents_bin_dir.
- name: Check whether repo-sync is installed
  ansible.builtin.stat:
    path: "{{ ai_agents_bin_dir }}/repo-sync"
  register: repo_sync_bin

- name: Install repo-sync {{ ai_agents_repo_sync_version }}
  when:
    - not repo_sync_bin.stat.exists
    - ansible_facts['architecture'] == 'x86_64'
  block:
    - name: Ensure bin directory exists
      ansible.builtin.file:
        path: "{{ ai_agents_bin_dir }}"
        state: directory
        mode: '0755'

    - name: Create temp directory for repo-sync
      ansible.builtin.tempfile:
        state: directory
        suffix: repo-sync
      register: repo_sync_tmp

    - name: Download and extract repo-sync archive
      ansible.builtin.unarchive:
        src: "{{ ai_agents_repo_sync_url }}"
        dest: "{{ repo_sync_tmp.path }}"
        remote_src: true

    - name: Install repo-sync binary
      ansible.builtin.copy:
        src: "{{ repo_sync_tmp.path }}/repo-sync"
        dest: "{{ ai_agents_bin_dir }}/repo-sync"
        mode: '0755'
        remote_src: true

    - name: Remove temp directory for repo-sync
      ansible.builtin.file:
        path: "{{ repo_sync_tmp.path }}"
        state: absent
