---
# Install rs (Go CLI) from its GitHub release into ai_agents_bin_dir.
- name: Warn and skip rs on non-x86_64 hosts
  ansible.builtin.debug:
    msg: >-
      Skipping rs installation: pinned release assets are x86_64 Linux and this
      host is {{ ansible_facts['architecture'] }}.
  when: ansible_facts['architecture'] != 'x86_64'

- name: Remove stale repo-sync binary
  ansible.builtin.file:
    path: "{{ ai_agents_bin_dir }}/repo-sync"
    state: absent
  when: ansible_facts['architecture'] == 'x86_64'


- name: Check whether rs is installed
  ansible.builtin.stat:
    path: "{{ ai_agents_bin_dir }}/rs"
  register: rs_bin

- name: Install rs {{ ai_agents_repo_sync_version }}
  when:
    - not rs_bin.stat.exists
    - ansible_facts['architecture'] == 'x86_64'
  block:
    - name: Ensure bin directory exists
      ansible.builtin.file:
        path: "{{ ai_agents_bin_dir }}"
        state: directory
        mode: '0755'

    - name: Create temp directory for rs
      ansible.builtin.tempfile:
        state: directory
        suffix: rs
      register: rs_tmp

    - name: Download and extract rs archive
      ansible.builtin.unarchive:
        src: "{{ ai_agents_repo_sync_url }}"
        dest: "{{ rs_tmp.path }}"
        remote_src: true

    - name: Install rs binary
      ansible.builtin.copy:
        src: "{{ rs_tmp.path }}/rs"
        dest: "{{ ai_agents_bin_dir }}/rs"
        mode: '0755'
        remote_src: true

    - name: Remove temp directory for rs
      ansible.builtin.file:
        path: "{{ rs_tmp.path }}"
        state: absent
