---
# Install Claude Code CLI via official installer script
- name: Check if claude is already installed
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.local/bin/claude"
  register: claude_binary

- name: Download Claude Code installer script
  ansible.builtin.get_url:
    url: https://claude.ai/install.sh
    dest: /tmp/claude_install.sh
    mode: '0755'
  when: not claude_binary.stat.exists

- name: Run Claude Code installer script
  ansible.builtin.command:
    cmd: /tmp/claude_install.sh
  args:
    creates: "{{ ansible_env.HOME }}/.local/bin/claude"
  when: not claude_binary.stat.exists

- name: Clean up Claude Code installer script
  ansible.builtin.file:
    path: /tmp/claude_install.sh
    state: absent
  when: not claude_binary.stat.exists
