---
# Reusable installer: fetch an upstream install script into a private temp
# directory and run it, skipping when the binary is already present. Inputs:
#   install_name   — label used in task names
#   install_url    — URL of the upstream installer script
#   install_binary — absolute path the installer is expected to create
#
# Security note: these upstream scripts are fetched over TLS and executed as the
# unprivileged user. They are not checksum-pinned (the upstreams ship rolling
# "latest" installers), so trust rests on the origin + TLS. The script lands in a
# private temp directory (unpredictable name, owner-only 0700) rather than a
# world-readable, predictable /tmp path.
- name: "Check whether already installed: {{ install_name }}"
  ansible.builtin.stat:
    path: "{{ install_binary }}"
  register: install_binary_stat

- name: "Create a private temp directory to install {{ install_name }}"
  ansible.builtin.tempfile:
    state: directory
    suffix: install
  register: install_dir
  when: not install_binary_stat.stat.exists

- name: "Download the installer script for {{ install_name }}"
  ansible.builtin.get_url:
    url: "{{ install_url }}"
    dest: "{{ install_dir.path }}/install.sh"
    mode: "0700"
  when: not install_binary_stat.stat.exists

- name: "Run the installer script for {{ install_name }}"
  ansible.builtin.command:
    cmd: "{{ install_dir.path }}/install.sh"
  args:
    creates: "{{ install_binary }}"
  when: not install_binary_stat.stat.exists

- name: "Remove the temp directory for {{ install_name }}"
  ansible.builtin.file:
    path: "{{ install_dir.path }}"
    state: absent
  when: not install_binary_stat.stat.exists
