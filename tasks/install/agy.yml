---
# Install AGY (Antigravity CLI) via its official installer script
- name: Install AGY via its installer script
  ansible.builtin.include_tasks: _install_script.yml
  vars:
    install_name: AGY
    install_url: https://antigravity.google/cli/install.sh
    install_binary: "{{ ansible_env.HOME }}/.local/bin/agy"
