---
# Install Codex CLI via its official installer script
- name: Check whether already installed
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.local/bin/codex"
  register: codex_binary

- name: Create a private temp directory
  ansible.builtin.tempfile:
    state: directory
    suffix: install
  register: codex_tmp
  when: not codex_binary.stat.exists

- name: Download the installer script
  ansible.builtin.get_url:
    url: https://chatgpt.com/codex/install.sh
    dest: "{{ codex_tmp.path }}/install.sh"
    mode: '0700'
  when: not codex_binary.stat.exists

- name: Run the installer script
  ansible.builtin.command:
    cmd: "{{ codex_tmp.path }}/install.sh"
    stdin: "N\n"
  args:
    creates: "{{ ansible_env.HOME }}/.local/bin/codex"
  when: not codex_binary.stat.exists

- name: Remove the temp directory
  ansible.builtin.file:
    path: "{{ codex_tmp.path }}"
    state: absent
  when: not codex_binary.stat.exists
